<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buyer Enquiry | Sabin Shrestha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a href="index.html" class="logo">Sabin Shrestha</a>
      <nav class="main-nav">
        <a href="index.html">Home</a>
        <a href="testimonials.html">Testimonials</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>

    </div>
  </header>
  <main>
    <section class="hero">
      <div class="hero-overlay"></div>
      <div class="container hero-content">
        <span class="eyebrow">Buyer Enquiry</span>
        <h1>Find your next home with confidence</h1>
        <p>Tell me what you are looking for and I will match you with the right properties and advice.</p>
      </div>
    </section>
    <section class="section-light">
      <div class="container">
        <div class="section-header">
          <span class="section-subtitle">Let’s start</span>
          <h2>Submit your buyer enquiry</h2>
        </div>
        <form class="contact-form">
          <label>
            Name
            <input type="text" placeholder="Your name" />
          </label>
          <label>
            Email
            <input type="email" placeholder="Your email" />
          </label>
          <label>
            Phone
            <input type="tel" placeholder="Your phone" />
          </label>
          <label>
            Property type
            <input type="text" placeholder="House, apartment, land..." />
          </label>
          <label>
            Budget range
            <input type="text" placeholder="Example: $500,000 - $750,000" />
          </label>
          <label>
            Message
            <textarea rows="5" placeholder="Briefly describe what you are looking for"></textarea>
          </label>
          <button type="submit" class="button button-primary">Send enquiry</button>
        </form>
      </div>
    </section>
  </main>
  <footer class="site-footer">
    <div class="container footer-grid">
      <p>© 2026 Aro Real Estate</p>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="testimonials.html">Testimonials</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </footer>
</body>
</html>
